name: CI

on:
  push:
    branches:
      - "development"
      - "master"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

# Cancel the previously running job when new Git commit has been received.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Integration tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10 # minutes
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      # Setup .npmrc file to publish to npm
      # See https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages#publishing-packages-to-the-npm-registry
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install modules
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run tests
        timeout-minutes: 5 # minutes
        run: |
          xvfb-run npm run testToJsonFile

      - name: Report to GitHub job
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        if: success() || failure()     # run this step even if previous step failed
        with:
          name: Integration tests report  # Name of the check run which will be created
          path: out/tests-report.json  # Path to test results
          reporter: mocha-json         # Format of test results

  validate-generated-files:
    name: "Validate freshness of makecomapp.schema.json"
    runs-on: ubuntu-latest
    timeout-minutes: 5 # minutes
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install modules
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Regenerate makecomapp.schema.json
        run: npm run schema:makecomapp

      - name: Check for uncommitted changes (must be empty)
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "ERROR: Generated files are out of date. See the diff above."
            echo "Run 'npm run schema:makecomapp' locally and commit the result."
            exit 1
          fi
